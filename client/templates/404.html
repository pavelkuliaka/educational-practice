{% extends "base.html" %}
{% block title %}Вход в аккаунт{% endblock %}
{% block body_class %}flex items-center justify-center p-4{% endblock %}
{% block content %}
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 space-y-6">
        <!-- Иконка 404 -->
        <div class="text-center">
            <div class="flex justify-center mb-4">
                <div class="bg-blue-100 rounded-full p-4 inline-block">
                    <i class="fas fa-map-signs text-6xl text-blue-600"></i>
                </div>
            </div>
            <h1 class="text-4xl font-bold text-gray-900 mb-2">404</h1>
            <h2 class="text-2xl font-semibold text-gray-800 mb-2">Страница не найдена</h2>
            <p class="text-gray-600 mb-6">
                Кажется, вы забрели не туда
            </p>
        </div>

        <!-- Разделитель -->
        <div class="relative">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300"></div>
            </div>
            <div class="relative flex justify-center text-sm">
            </div>
        </div>

        <div class="space-y-3">
            <!-- Вернуться на главную -->
            <a href="{{ url_for('home') }}"
            class="w-full flex items-center justify-center gap-3 border border-gray-300 text-gray-700 font-semibold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-[1.02] hover:bg-gray-50">
                <i class="fas fa-home"></i>
                <span>Вернуться назад</span>
            </a>
        </div>
    </div>
{% endblock %}
