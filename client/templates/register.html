{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block body_class %}flex items-center justify-center p-4{% endblock %}
{% block content %}
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 space-y-6">
        <!-- Заголовок -->
        <div class="text-center">
            <h1 class="text-3xl font-bold text-gray-900">Регистрация</h1>
            <p class="text-gray-600 mt-2">Создайте аккаунт</p>
        </div>

        <!-- Форма регистрации -->
        <form method="POST" action="{{ url_for('register') }}" class="space-y-4">
            <!-- Поле email -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                    Email
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email"
                    placeholder="example@mail.com"
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition duration-200"
                    required
                >
            </div>

            <!-- Поле пароля -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                    Пароль
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    pattern="\S+"
                    title="Пароль не должен содержать пробелы"
                    minlength="6"
                    maxlength="20"
                    placeholder="••••••••"
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition duration-200"
                    required
                >
            </div>

            <!-- Кнопка регистрации -->
            <button 
                type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-[1.02]"
            >
                Зарегистрироваться
            </button>
        </form>

        <!-- Ссылка на вход -->
        <p class="text-center text-gray-600">
            Уже есть аккаунт? 
            <a href="{{ url_for('login') }}" class="text-blue-600 hover:text-blue-800 font-semibold hover:underline">
                Войти
            </a>
        </p>
    </div>
{% endblock %}
