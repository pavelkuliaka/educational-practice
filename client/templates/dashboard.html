{% extends "base.html" %}
{% block title %}Личный кабинет{% endblock %}
{% block body_class %}flex items-center justify-center p-4{% endblock %}
{% block content %}
<div class="w-full max-w-md mx-auto">
    <div class="bg-white rounded-2xl shadow-xl p-8">
        <!-- Шапка с заголовком и кнопкой выхода -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-900">
                Личный кабинет
            </h1>
            <a href="{{ url_for('logout') }}" 
               class="text-gray-500 hover:text-red-600 transition-colors">
                <i class="fas fa-sign-out-alt text-xl"></i>
            </a>
        </div>
        
        <!-- Приветствие с email -->
        <div class="text-center py-8">
            <div class="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-user text-blue-600 text-3xl"></i>
            </div>
            <p class="text-gray-600 mb-1">Добро пожаловать!</p>
            <p class="text-lg font-semibold text-gray-800">Ваш Email: {{ user_email }}</p>
        </div>
    </div>
</div>
{% endblock %}
