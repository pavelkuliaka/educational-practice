{% extends "base.html" %}
{% block title %}Вход в аккаунт{% endblock %}
{% block body_class %}flex items-center justify-center p-4{% endblock %}
{% block content %}
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 space-y-6">
        <!-- Заголовок -->
        <div class="text-center">
            <h1 class="text-3xl font-bold text-gray-900">Добро пожаловать</h1>
            <p class="text-gray-600 mt-2">Войдите или зарегистрируйтесь</p>
        </div>
        <!-- Форма авторизации -->
        <form method="POST" action="{{ url_for('login_page') }}" class="space-y-4">
            <!-- Поле email -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                    Email
                </label>
                <input 
                    type="text" 
                    id="email" 
                    name="email"
                    placeholder="example@mail.com"
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition duration-200"
                    required
                >
            </div>

            <!-- Поле пароля -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                    Пароль
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    placeholder="••••••••"
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition duration-200"
                    required
                >
            </div>

            <!-- Кнопка входа -->
            <button 
                type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-[1.02]"
            >
                Войти
            </button>
            
            <!-- Кнопка регистрации -->
            <a href="{{ url_for('register_page') }}"
                class="block w-full text-center bg-white hover:bg-gray-50 text-blue-600 font-semibold py-3 px-4 rounded-lg border-2 border-blue-600 transition duration-200 transform hover:scale-[1.02]">
                Зарегистрироваться
            </a>
        </form>

        <!-- Разделитель -->
        <div class="relative">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-4 bg-white text-gray-500">или войдите через</span>
            </div>
        </div>

        <!-- Кнопки соцсетей -->
        <div class="space-y-3">
            <!-- Google -->
            <a href="{{ url_for('login_provider', provider='google') }}" class="w-full flex items-center justify-center gap-3 font-semibold bg-white hover:bg-gray-50 border border-gray-300 text-gray-700 font-medium py-3 px-4 rounded-lg transition duration-200 transform hover:scale-[1.02]">
                <i class="fab fa-google text-red-500 text-xl"></i>
                <span>Google</span>
            </a>

            <!-- GitHub -->
            <a href="{{ url_for('login_provider', provider='github') }}" class="w-full flex items-center justify-center gap-3 bg-zinc-800 hover:bg-zinc-950 text-white font-medium py-3 px-4 rounded-lg transition duration-200 transform hover:scale-[1.02]">
                <i class="fa-brands fa-github text-xl"></i>
                <span>GitHub</span>
            </a>

            <!-- Яндекс -->
            <a href="{{ url_for('login_provider', provider='yandex') }}" class="w-full flex items-center justify-center gap-3 bg-red-600 hover:bg-red-700 text-white font-medium py-3 px-4 rounded-lg transition duration-200 transform hover:scale-[1.02]">
                <i class="fab fa-yandex-international text-xl"></i>
                <span>Яндекс</span>
            </a>
            <!-- Мой сервис -->
            <a href="{{ url_for('login_provider', provider='my_service') }}" class="w-full flex items-center justify-center gap-3 border border-gray-300 text-gray-700 font-semibold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-[1.02]">
                <span>Мой сервис</span>
            </a>
        </div>
    </div>
{% endblock %}
