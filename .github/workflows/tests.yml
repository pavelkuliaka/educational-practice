name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests for provider
        run: PYTHONPATH=provider/src uv run pytest provider/tests/ -v

      - name: Run tests for client
        run: PYTHONPATH=client/src uv run pytest client/tests/ -v