{% extends "base.html" %}
{% block title %}Регистрация пользователя{% endblock %}
{% block content %}
    <div class="bg-gray-800 border border-gray-700 rounded-xl w-full max-w-md p-8 space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-semibold">Создать аккаунт</h1>
            <p class="text-gray-400 mt-2 text-sm">Введите ваши данные для регистрации</p>
        </div>

        <!-- {% if success %}
        <div class="bg-green-900/30 border border-green-500 text-green-400 px-4 py-3 rounded-md text-sm">
            {{ success }}
        </div>
        {% endif %} -->

        <form method="POST" action="{{ url_for('register_user') }}" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-300 mb-1">
                    Email
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email"
                    placeholder="example@mail.com"
                    class="w-full px-3 py-2 rounded-md bg-gray-900 border border-gray-700 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-blue-500 transition-colors"
                    required
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-300 mb-1">
                    Пароль
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    pattern="\S+"
                    title="Пароль не должен содержать пробелы"
                    minlength="6"
                    maxlength="20"
                    placeholder="••••••••"
                    class="w-full px-3 py-2 rounded-md bg-gray-900 border border-gray-700 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-blue-500 transition-colors"
                    required
                >
            </div>

            <button 
                type="submit" 
                class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2.5 px-4 rounded-md transition-colors"
            >
                Создать аккаунт
            </button>
        </form>

        <p class="text-center text-gray-400 text-sm">
            Уже есть аккаунт? 
            <a href="{{ url_for('login') }}" class="text-blue-400 hover:text-blue-300">Войти</a>
        </p>
    </div>
{% endblock %}
