{% extends "base.html" %}
{% block title %}Создание приложения{% endblock %}
{% block content %}
    <div class="bg-gray-800 border border-gray-700 rounded-xl w-full max-w-md p-8 space-y-6">
        <div class="text-center relative">
            <h1 class="text-2xl font-semibold">Создать приложение</h1>
            <p class="text-gray-400 mt-2 text-sm">Создайте новый OAuth-клиент</p>
            <a href="{{ url_for('dashboard') }}" class="absolute top-0 right-0 text-gray-400 hover:text-gray-200 text-sm">✕</a>
        </div>

        <form method="POST" action="{{ url_for('register_app') }}" class="space-y-4">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-300 mb-1">
                    Название приложения
                </label>
                <input 
                    type="text" 
                    id="name" 
                    name="name"
                    placeholder="My app"
                    class="w-full px-3 py-2 rounded-md bg-gray-900 border border-gray-700 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-blue-500 transition-colors"
                    required
                >
            </div>

            <div>
                <label for="redirect_uri" class="block text-sm font-medium text-gray-300 mb-1">
                    Redirect URI
                </label>
                <input 
                    type="url" 
                    id="redirect_uri" 
                    name="redirect_uri"
                    placeholder="http://localhost:8080/callback"
                    class="w-full px-3 py-2 rounded-md bg-gray-900 border border-gray-700 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-blue-500 transition-colors"
                    required
                >
                <p class="text-xs text-gray-500 mt-1">URL для колбэка после авторизации</p>
            </div>

            <button 
                type="submit" 
                class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2.5 px-4 rounded-md transition-colors"
            >
                Создать приложение
            </button>
        </form>
    </div>
{% endblock %}
