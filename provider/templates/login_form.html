{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
    <div class="bg-gray-800 border border-gray-700 rounded-xl w-full max-w-md p-8 space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-semibold">Вход</h1>
            <p class="text-gray-400 mt-2 text-sm">Войдите для продолжения</p>
        </div>

        <form method="POST" class="space-y-4">
            <input type="hidden" name="next" value="{{ next_url }}">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-300 mb-1">
                    Email
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email"
                    placeholder="example@mail.com"
                    class="w-full px-3 py-2 rounded-md bg-gray-900 border border-gray-700 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-blue-500 transition-colors"
                    required
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-300 mb-1">
                    Пароль
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    placeholder="••••••••"
                    class="w-full px-3 py-2 rounded-md bg-gray-900 border border-gray-700 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-blue-500 transition-colors"
                    required
                >
            </div>

            <button 
                type="submit" 
                class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2.5 px-4 rounded-md transition-colors"
            >
                Войти
            </button>
        </form>

        <p class="text-center text-gray-400 text-sm">
            Нет аккаунта? 
            <a href="{{ url_for('register_user') }}" class="text-blue-400 hover:text-blue-300">Зарегистрироваться</a>
        </p>
    </div>
{% endblock %}
